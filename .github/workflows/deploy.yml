name: Build & Deploy Deron Website to cPanel

on:
  workflow_dispatch:
    inputs:
      deploy_code:
        description: 'Nhập mã triển khai 6 số'
        required: true
        default: ''
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      CI: false
      # Giữ nguyên env để không ảnh hưởng phần khác
      REACT_APP_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      REACT_APP_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Prepare multi-page static package
        run: |
          set -e

          echo "Cleaning old build folder..."
          rm -rf build
          mkdir -p build

          echo "Copying root HTML pages and SEO files..."
          ROOT_FILES=(
            "index.html"
            "gioi-thieu.html"
            "cong-nghe.html"
            "ung-dung.html"
            "press.html"
            "nhat-ky.html"
            "phap-ly.html"
            "thong-tin.html"
            "lien-he.html"
            "san-pham.html"
            "robots.txt"
            "sitemap.xml"
          )

          for file in "${ROOT_FILES[@]}"; do
            if [ -f "$file" ]; then
              cp "$file" build/
              echo "Copied: $file"
            else
              echo "Skipped missing file: $file"
            fi
          done

          echo "Copying required folders..."
          REQUIRED_DIRS=(
            "assets"
            "ung-dung"
            "public"
          )

          for dir in "${REQUIRED_DIRS[@]}"; do
            if [ -d "$dir" ]; then
              cp -R "$dir" build/
              echo "Copied directory: $dir"
            else
              echo "Skipped missing directory: $dir"
            fi
          done

          echo "Copying common static assets in repo root..."
          find . -maxdepth 1 -type f \( \
            -iname "*.png" -o \
            -iname "*.jpg" -o \
            -iname "*.jpeg" -o \
            -iname "*.webp" -o \
            -iname "*.svg" -o \
            -iname "*.ico" \
          \) -exec cp {} build/ \;

          echo "Final build content:"
          find build -maxdepth 4 -type f | sort

      - name: Decide whether to deploy
        id: guard
        run: |
          OWNER="NpHarry-Tech"

          if [ "${GITHUB_ACTOR}" = "$OWNER" ] && [ "${{ github.event.inputs.deploy_code }}" = "${{ secrets.DEPLOY_CODE }}" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "✅ Chủ repo + đúng mã. Cho phép deploy."
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Không phải chủ repo hoặc sai mã. Chỉ build, KHÔNG deploy."
          fi

      - name: Deploy build folder to cPanel via FTP
        if: steps.guard.outputs.deploy == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          log-level: verbose
          local-dir: ./build/
          server-dir: ${{ secrets.REMOTE_DIR }}
          exclude: |
            **/.git*
            **/node_modules/**
            **/src/**
            **/README.md
            **/package*.json
            **/tailwind.config.js
            **/.env*
            **/.github/**
