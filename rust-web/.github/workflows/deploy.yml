name: Build & Deploy Deron Rust Web

on:
  workflow_dispatch:
    inputs:
      deploy_code:
        description: 'Nhập mã triển khai 6 số'
        required: true
        default: ''
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-web/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-web/Cargo.lock') }}

      - name: Setup Node.js (for Tailwind)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Tailwind CSS
        working-directory: rust-web
        run: |
          npx tailwindcss -i ./input.css -o ./public/static/style.css --minify

      - name: Build Rust binary
        working-directory: rust-web
        run: cargo build --release

      - name: Run tests
        working-directory: rust-web
        run: cargo test

      - name: Decide whether to deploy
        id: guard
        run: |
          OWNER="NpHarry-Tech"
          if [ "${GITHUB_ACTOR}" = "$OWNER" ] && [ "${{ github.event.inputs.deploy_code }}" = "${{ secrets.DEPLOY_CODE }}" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package for deployment
        if: steps.guard.outputs.deploy == 'true'
        working-directory: rust-web
        run: |
          mkdir -p deploy
          cp target/release/deron-web deploy/
          cp -r public deploy/

      - name: Deploy to server
        if: steps.guard.outputs.deploy == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftp
          log-level: verbose
          local-dir: ./rust-web/deploy/
          server-dir: ${{ secrets.REMOTE_DIR }}
          exclude: |
            **/.git*
            **/target/**
            **/src/**
