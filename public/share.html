<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>DERON</title>

    <meta
      name="description"
      content="chiến dịch Điện Biên Phủ trong lĩnh vực logistics"
    />

    <meta property="og:title" content="DERON" />
    <meta
      property="og:description"
      content="chiến dịch Điện Biên Phủ trong lĩnh vực logistics"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://deron.vn/" />
    <meta property="og:image" content="https://deron.vn/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        padding: 24px;
        line-height: 1.5;
      }
      h1 {
        margin: 0 0 8px 0;
      }
      p {
        margin: 0 0 16px 0;
        color: #444;
      }
    </style>
  </head>
  <body>
    <h1>DERON</h1>
    <p id="share-desc"></p>
    <p><a id="share-link" href="/"></a></p>

    <script>
      (function(){
        var T={
          vi:{desc:'chiến dịch Điện Biên Phủ trong lĩnh vực logistics',link:'Mở website'},
          en:{desc:'A Dien Bien Phu campaign in the logistics sector',link:'Open website'},
          zh:{desc:'物流领域的奠边府战役',link:'打开网站'}
        };
        function detect(){
          var langs=(navigator.languages||[]).concat(navigator.language||'');
          for(var i=0;i<langs.length;i++){
            var l=(langs[i]||'').toLowerCase();
            if(l.indexOf('zh')===0) return 'zh';
            if(l.indexOf('en')===0) return 'en';
            if(l.indexOf('vi')===0) return 'vi';
          }
          return 'vi';
        }
        var lang=detect();
        var t=T[lang]||T.vi;
        document.getElementById('share-desc').textContent=t.desc;
        document.getElementById('share-link').textContent=t.link;
        document.documentElement.lang=lang==='zh'?'zh-CN':lang;
      })();
    </script>
  </body>
</html>
