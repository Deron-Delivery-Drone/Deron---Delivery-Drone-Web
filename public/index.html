<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />

    <!-- Canonical / SEO -->
    <title>DERON</title>
    <link rel="canonical" href="https://deron.vn/" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- Basic SEO description (một số nền tảng có dùng) -->
    <meta
      name="description"
      content="chiến dịch Điện Biên Phủ trong lĩnh vực logistics"
    />

    <!-- Open Graph (Facebook/Messenger/LinkedIn/...) -->
    <meta property="og:site_name" content="DERON" />
    <meta property="og:title" content="DERON" />
    <meta
      property="og:description"
      content="chiến dịch Điện Biên Phủ trong lĩnh vực logistics"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://deron.vn/" />
    <!-- Tạm dùng logo hiện tại; sau này bạn thay bằng og-image 1200x630 -->
    <meta property="og:image" content="https://deron.vn/Deron-logo.png" />
    <meta property="og:image:alt" content="DERON" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DERON" />
    <meta
      name="twitter:description"
      content="chiến dịch Điện Biên Phủ trong lĩnh vực logistics"
    />
    <meta name="twitter:image" content="https://deron.vn/Deron-logo.png" />

    <!-- Icons (Safari / iOS / Google) -->
    <!-- iOS Safari thumbnail / Add to Home Screen dùng apple-touch-icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- Fallback favicon -->
    <link rel="icon" href="%PUBLIC_URL%/Deron-logo.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
