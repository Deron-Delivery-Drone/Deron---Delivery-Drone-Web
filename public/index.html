<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />

    <!-- Viewport / Theme -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- Title / Canonical -->
    <title>DERON</title>
    <link rel="canonical" href="https://deron.vn/" />

    <!-- Basic SEO -->
    <meta
      name="description"
      content="chiến dịch Điện Biên Phủ trong lĩnh vực logistics"
    />

    <!-- Open Graph (Facebook / Zalo / Messenger) -->
    <meta property="og:site_name" content="DERON" />
    <meta property="og:title" content="DERON" />
    <meta
      property="og:description"
      content="chiến dịch Điện Biên Phủ trong lĩnh vực logistics"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://deron.vn/" />

    <!-- OG Image (SMS / iMessage / Zalo / FB) -->
    <meta property="og:image" content="https://deron.vn/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="DERON" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DERON" />
    <meta
      name="twitter:description"
      content="chiến dịch Điện Biên Phủ trong lĩnh vực logistics"
    />
    <meta name="twitter:image" content="https://deron.vn/og-image.jpg" />

    <!-- Favicons (FIX LỖI TAB ICON) -->
    <!-- favicon.ico luôn để trước để browser không chọn nhầm -->
    <link rel="icon" href="/Deron-logo.png" sizes="any" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
    />

    <!-- iOS / Safari -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
