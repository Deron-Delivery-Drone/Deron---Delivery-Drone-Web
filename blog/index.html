<script>
  function toggleLangDrop() {
    const dd = document.getElementById('langDropdown');
    const isOpen = dd.classList.toggle('open');
    if (isOpen) {
      document.addEventListener('click', function h(e) {
        if (!dd.contains(e.target)) {
          dd.classList.remove('open');
          document.removeEventListener('click', h);
        }
      });
    }
  }
  function pgSetLang(lang) {
    localStorage.setItem('deron_lang', lang);
    const flagMap = { vi: 'fi-vn', en: 'fi-us', zh: 'fi-cn' };
    const labelMap = { vi: 'VI', en: 'EN', zh: 'ZH' };
    const f = document.getElementById('pgLangFlag');
    const l = document.getElementById('pgLangLabel');
    if (f) f.className = 'fi ' + (flagMap[lang] || 'fi-vn') + ' fis lang-flag';
    if (l) l.textContent = labelMap[lang] || 'VI';
    document.querySelectorAll('.lang-dropdown-item').forEach(b => {
      b.classList.toggle('active', b.dataset.lang === lang);
    });
    document.getElementById('langDropdown').classList.remove('open');
    if (window.applyDeronTranslations) window.applyDeronTranslations(lang);
    else document.documentElement.lang = lang;
    if (window.applyBlogPageLanguage) window.applyBlogPageLanguage(lang);
    if (window.renderBlogListingLanguage) window.renderBlogListingLanguage(lang);
  }
  document.addEventListener('DOMContentLoaded', () => {
    const lang = localStorage.getItem('deron_lang') || 'vi';
    pgSetLang(lang);
  });
</script>

        vi: 'Một luồng nội dung chung cho thông tin công khai, tin tức, báo chí và các cập nhật vận hành của Deron.',
        en: 'One editorial stream for public information, company news, press resources, and operating updates from Deron.',
        zh: '一个统一的信息流，汇集 Deron 的公开信息、公司新闻、媒体资料与运营更新。',
      },
      date: { vi: 'Bản tin', en: 'Newsroom', zh: '资讯室' },
    };

    let RAIL_ITEMS = [
      {
        category: 'info',
        href: '#thong-tin',
        title: { vi: 'Thông tin công khai', en: 'Public information', zh: '公开信息' },
        summary: {
          vi: 'Nguồn tham chiếu, dữ liệu thị trường, DATCS và kênh xác minh được đặt ngay trong Blog.',
          en: 'References, market data, DATCS notes, and verification routes are grouped inside the Blog.',
          zh: '参考资料、市场数据、DATCS 说明与核实渠道统一放在博客中。',
        },
      },
      {
        category: 'news',
        href: '#cap-nhat',
        title: { vi: 'Tin tức', en: 'News', zh: '新闻' },
        summary: {
          vi: 'Các thông báo, sự kiện và diễn biến mới của Deron được đặt trong cùng một luồng bản tin.',
          en: 'Announcements, events, and public developments from Deron stay in one newsroom flow.',
          zh: 'Deron 的公告、活动与公开动态会统一放入资讯流。',
        },
      },
      {
        category: 'updates',
        href: '#cap-nhat',
        title: { vi: 'Cập nhật vận hành', en: 'Operating updates', zh: '运营更新' },
        summary: {
          vi: 'Tiến độ sản phẩm, công nghệ và DATCS được gom vào phần cập nhật bên dưới.',
          en: 'Product, technology, and DATCS progress is collected in the updates desk below.',
          zh: '产品、技术与 DATCS 进展会汇总在下方的更新版块。',
        },
      },
      {
        category: 'press',
        href: '#bao-chi',
        title: { vi: 'Báo chí', en: 'Press', zh: '媒体' },
        summary: {
          vi: 'Tư liệu truyền thông và kênh liên hệ chính thức cho báo chí.',
          en: 'Press materials, media information, and official press contact routes.',
          zh: '媒体资料、传播信息与官方媒体联系渠道。',
        },
      },
    ];

    const UPDATE_ITEMS = [
      {
        category: 'news',
        date: { vi: 'Tin mới', en: 'News', zh: '新闻' },
        title: { vi: 'Tin tức', en: 'News', zh: '新闻' },
        summary: {
          vi: 'Thông báo, hoạt động và các điểm mới đáng chú ý của Deron sẽ được đăng tại đây khi công bố.',
          en: 'Announcements, activities, and notable Deron developments will be published here.',
          zh: 'Deron 的公告、活动与重要动态会在这里发布。',
        },
      },
      {
        category: 'updates',
        date: { vi: 'Cập nhật', en: 'Updates', zh: '更新' },
        title: { vi: 'Cập nhật sản phẩm và công nghệ', en: 'Product and technology updates', zh: '产品与技术更新' },
        summary: {
          vi: 'Các ghi nhận về sản phẩm, công nghệ bay, phần mềm và thử nghiệm được trình bày theo dạng bản tin.',
          en: 'Product, flight technology, software, and testing notes are presented as newsroom updates.',
          zh: '产品、飞行技术、软件与测试记录会以资讯更新形式呈现。',
        },
      },
      {
        category: 'updates',
        date: { vi: 'DATCS', en: 'DATCS', zh: 'DATCS' },
        title: { vi: 'DATCS và hạ tầng điều phối', en: 'DATCS and coordination infrastructure', zh: 'DATCS 与调度基础设施' },
        summary: {
          vi: 'Những thay đổi liên quan DATCS, GCS/UTM và quy trình truy cập được gom vào cùng mạch cập nhật.',
          en: 'DATCS, GCS/UTM, and access-process changes are grouped in the same update stream.',
          zh: 'DATCS、GCS/UTM 与访问流程相关变更会统一汇总。',
        },
      },
    ];

    let PRESS_FEATURE = {
      category: 'press',
      title: { vi: 'Báo chí và truyền thông', en: 'Press and media', zh: '媒体与传播' },
      summary: {
        vi: 'Thông cáo, tư liệu hình ảnh, hồ sơ thương hiệu và kênh liên hệ chính thức cho báo chí.',
        en: 'Press releases, media assets, brand profile notes, and official press contact information.',
        zh: '新闻稿、媒体素材、品牌资料与官方媒体联系方式。',
      },
    };

    let PRESS_FACTS = [
      {
        label: { vi: 'Tên tổ chức', en: 'Organization', zh: '组织名称' },
        value: { vi: 'Deron', en: 'Deron', zh: 'Deron' },
      },
      {
        label: { vi: 'Người sáng lập', en: 'Founder', zh: '创始人' },
        value: { vi: 'Nguyễn Phúc Huy', en: 'Nguyễn Phúc Huy', zh: 'Nguyễn Phúc Huy' },
      },
      {
        label: { vi: 'Trụ sở', en: 'Base', zh: '总部' },
        value: { vi: 'TP. Hồ Chí Minh', en: 'Ho Chi Minh City', zh: '胡志明市' },
      },
      {
        label: { vi: 'Liên hệ báo chí', en: 'Press contact', zh: '媒体联系' },
        value: { vi: 'ceo.deron@gmail.com', en: 'ceo.deron@gmail.com', zh: 'ceo.deron@gmail.com' },
      },
    ];

    let PRESS_BOILERPLATE = {
      title: { vi: 'Về Deron', en: 'About Deron', zh: '关于 Deron' },
      summary: {
        vi: 'Deron xây dựng hệ thống drone giao hàng tự hành phục vụ y tế khẩn cấp, cứu trợ thiên tai và logistics vùng khó tiếp cận tại Việt Nam. Công nghệ được phát triển theo từng giai đoạn cho địa hình, pháp lý và cộng đồng Việt Nam.',
        en: 'Deron builds autonomous delivery drone systems for emergency medical logistics, disaster relief, and remote-area supply chains in Vietnam. Its technology is developed step by step for Vietnamese terrain, regulations, and communities.',
        zh: 'Deron 为越南构建用于紧急医疗物流、灾害救援和偏远地区供应链的自主送货无人机系统，技术按越南地形、法规和社区需求逐步开发。',
      },
    };

    let INFO_ITEMS = [
      {
        title: { vi: 'Văn bản pháp lý', en: 'Legal references', zh: '法律参考' },
        summary: {
          vi: 'Nghị định 288/2025/NĐ-CP, Nghị quyết 57-NQ/TW và Quyết định 1131/QĐ-TTg là các mốc tham khảo công khai.',
          en: 'Decree 288/2025/ND-CP, Resolution 57-NQ/TW, and Decision 1131/QD-TTg are public reference points.',
          zh: '第 288/2025/NĐ-CP 号法令、57-NQ/TW 决议和 1131/QĐ-TTg 决定是公开参考资料。',
        },
      },
      {
        title: { vi: 'Dữ liệu thị trường', en: 'Market data', zh: '市场数据' },
        summary: {
          vi: 'Deron chỉ dùng các số liệu có nguồn công khai như World Bank, GSO và Bộ GTVT khi trình bày bối cảnh thị trường.',
          en: 'Deron uses public sources such as the World Bank, GSO, and transport-sector references when discussing market context.',
          zh: 'Deron 在说明市场背景时仅使用世界银行、GSO 和交通领域公开来源。',
        },
      },
      {
        title: { vi: 'DATCS', en: 'DATCS', zh: 'DATCS' },
        summary: {
          vi: 'DATCS là phần mềm GCS/UTM đang phát triển. Thông tin tải và yêu cầu truy cập nằm tại trang DATCS install.',
          en: 'DATCS is a GCS/UTM software platform in development. Download and access-request information is on the DATCS install page.',
          zh: 'DATCS 是正在开发中的 GCS/UTM 软件平台。下载与访问申请信息位于 DATCS install 页面。',
        },
      },
      {
        title: { vi: 'Kênh xác minh', en: 'Verification channel', zh: '核实渠道' },
        summary: {
          vi: 'Với thông tin chưa rõ hoặc cần xác minh, hãy liên hệ Deron qua email ceo.deron@gmail.com.',
          en: 'For unclear or verification-sensitive information, contact Deron at ceo.deron@gmail.com.',
          zh: '如需核实尚不明确的信息，请通过 ceo.deron@gmail.com 联系 Deron。',
        },
      },
    ];

    function currentLang() {
      const stored = localStorage.getItem('deron_lang');
      return ['vi', 'en', 'zh'].includes(stored) ? stored : 'vi';
    }

    function t(key, lang) {
      const dict = window.T && (window.T[lang] || window.T.vi);
      const localDict = BLOG_I18N[lang] || BLOG_I18N.vi;
      const fallback = window.T && window.T.vi;
      return (dict && dict[key]) || localDict[key] || (fallback && fallback[key]) || BLOG_I18N.vi[key] || key;
    }

    function textFor(item, field, lang) {
      return (item[field] && (item[field][lang] || item[field].vi)) || '';
    }

    function setMeta(selector, value) {
      const el = document.querySelector(selector);
      if (el && value) el.setAttribute('content', value);
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function localizedPost(post, lang) {
      const translation = post && post.translations && post.translations[lang];
      return Object.assign({}, post, translation || {});
    }

    function postToItem(post, lang) {
      const localized = localizedPost(post, lang);
      return {
        id: post.slug,
        category: post.category || 'updates',
        href: `/blog/${encodeURIComponent(post.slug)}`,
        dateText: post.date_display || post.date || '',
        titleText: localized.title || '',
        summaryText: localized.summary || '',
        cta: t('blog.card.read', lang),
      };
    }

    function itemFromStatic(item, lang, ctaKey) {
      return {
        category: item.category,
        href: item.href || '',
        dateText: textFor(item, 'date', lang),
        titleText: textFor(item, 'title', lang),
        summaryText: textFor(item, 'summary', lang),
        cta: item.href ? t(ctaKey || 'blog.card.open', lang) : '',
      };
    }

    function tagFor(item) {
      return item.href ? 'a' : 'article';
    }

    function hrefAttr(item) {
      return item.href ? ` href="${escapeHtml(item.href)}"` : '';
    }

    function renderLead(lang) {
      const item = cachedPosts.length ? postToItem(cachedPosts[0], lang) : itemFromStatic(LEAD_STORY, lang, 'blog.card.open');
      const tag = tagFor(item);
      leadSlot.innerHTML = `
        <${tag} class="lead-story"${hrefAttr(item)}>
          <div class="lead-story-kicker">${escapeHtml(t(`blog.cat.${item.category}`, lang))}</div>
          <h3>${escapeHtml(item.titleText)}</h3>
          <p class="lead-story-summary">${escapeHtml(item.summaryText)}</p>
          <div class="story-meta">
            ${item.dateText ? `<span>${escapeHtml(item.dateText)}</span>` : ''}
            ${item.cta ? `<span class="story-cta">${escapeHtml(item.cta)}</span>` : ''}
          </div>
        </${tag}>
      `;
    }

    function renderRail(lang) {
      railSlot.innerHTML = RAIL_ITEMS.map((raw) => {
        const item = itemFromStatic(raw, lang, 'blog.card.open');
        const tag = tagFor(item);
        return `
          <${tag} class="rail-item"${hrefAttr(item)}>
            <div class="rail-kicker">${escapeHtml(t(`blog.cat.${item.category}`, lang))}</div>
            <h3>${escapeHtml(item.titleText)}</h3>
            <p>${escapeHtml(item.summaryText)}</p>
          </${tag}>
        `;
      }).join('');
    }

    function renderUpdates(lang) {
      const postItems = cachedPosts.map((post) => postToItem(post, lang));
      const items = postItems.length ? postItems : UPDATE_ITEMS.map((item) => itemFromStatic(item, lang, 'blog.card.open'));
      updatesSlot.innerHTML = items.map((item) => {
        const tag = tagFor(item);
        return `
          <${tag} class="story-row"${hrefAttr(item)}>
            <div class="story-date">${escapeHtml(item.dateText || t(`blog.cat.${item.category}`, lang))}</div>
            <div>
              <div class="story-kicker">${escapeHtml(t(`blog.cat.${item.category}`, lang))}</div>
              <h3>${escapeHtml(item.titleText)}</h3>
              <p>${escapeHtml(item.summaryText)}</p>
              ${item.cta ? `<div class="story-meta"><span class="story-cta">${escapeHtml(item.cta)}</span></div>` : ''}
            </div>
          </${tag}>
        `;
      }).join('');
    }

    function renderPress(lang) {
      const item = itemFromStatic(PRESS_FEATURE, lang, 'blog.card.open');
      const facts = PRESS_FACTS.map((fact) => `
        <div class="press-fact">
          <div class="press-fact-label">${escapeHtml(textFor(fact, 'label', lang))}</div>
          <div class="press-fact-value">${escapeHtml(textFor(fact, 'value', lang))}</div>
        </div>
      `).join('');
      pressSlot.innerHTML = `
        <article class="press-feature">
          <div class="story-kicker">${escapeHtml(t(`blog.cat.${item.category}`, lang))}</div>
          <h3>${escapeHtml(item.titleText)}</h3>
          <p>${escapeHtml(item.summaryText)}</p>
          <div class="press-facts">${facts}</div>
          <div class="press-boilerplate">
            <h4>${escapeHtml(textFor(PRESS_BOILERPLATE, 'title', lang))}</h4>
            <p>${escapeHtml(textFor(PRESS_BOILERPLATE, 'summary', lang))}</p>
          </div>
          <div class="press-actions">
            <a href="mailto:ceo.deron@gmail.com?subject=Press%20Inquiry">${escapeHtml(t('blog.card.contact', lang))}: ceo.deron@gmail.com</a>
          </div>
        </article>
      `;
    }

    function renderInfo(lang) {
      infoGrid.innerHTML = INFO_ITEMS.map((item) => `
        <article class="info-note">
          <div class="info-kicker">${escapeHtml(t('blog.cat.info', lang))}</div>
          <h3>${escapeHtml(textFor(item, 'title', lang))}</h3>
          <p>${escapeHtml(textFor(item, 'summary', lang))}</p>
        </article>
      `).join('');
    }

    function renderNewsroom(lang) {
      renderLead(lang);
      renderRail(lang);
      renderUpdates(lang);
      renderPress(lang);
      renderInfo(lang);
    }

    window.applyBlogPageLanguage = function applyBlogPageLanguage(lang) {
      lang = ['vi', 'en', 'zh'].includes(lang) ? lang : 'vi';
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (BLOG_I18N.vi[key] !== undefined) el.textContent = t(key, lang);
      });
      document.querySelectorAll('[data-i18n-html]').forEach((el) => {
        const key = el.getAttribute('data-i18n-html');
        if (BLOG_I18N.vi[key] !== undefined) el.innerHTML = t(key, lang);
      });
      document.title = t('blog.meta.title', lang);
      const desc = t('blog.meta.description', lang);
      setMeta('meta[name="description"]', desc);
      setMeta('meta[property="og:title"]', t('blog.meta.title', lang));
      setMeta('meta[property="og:description"]', desc);
      setMeta('meta[name="twitter:title"]', t('blog.meta.title', lang));
      setMeta('meta[name="twitter:description"]', desc);
      renderNewsroom(lang);
    };

    window.renderBlogListingLanguage = function renderBlogListingLanguage(lang) {
      lang = ['vi', 'en', 'zh'].includes(lang) ? lang : currentLang();
      renderNewsroom(lang);
    };

    function unflattenLocalized(obj, fields) {
      if (!obj || typeof obj !== 'object') return null;
      const out = Object.assign({}, obj);
      for (const field of fields) {
        const vi = obj[field + '_vi'];
        if (vi == null) continue;
        out[field] = {
          vi: vi,
          en: obj[field + '_en'] || vi,
          zh: obj[field + '_zh'] || vi,
        };
      }
      return out;
    }

    function applySidebarConfig(cfg) {
      if (!cfg || typeof cfg !== 'object') return;
      if (Array.isArray(cfg.rail) && cfg.rail.length) {
        RAIL_ITEMS = cfg.rail.map((it) => unflattenLocalized(it, ['title', 'summary'])).filter(Boolean);
      }
      if (Array.isArray(cfg.info) && cfg.info.length) {
        INFO_ITEMS = cfg.info.map((it) => unflattenLocalized(it, ['title', 'summary'])).filter(Boolean);
      }
      if (cfg.press_feature) {
        const pf = unflattenLocalized(cfg.press_feature, ['title', 'summary']);
        if (pf) PRESS_FEATURE = Object.assign({}, PRESS_FEATURE, pf);
      }
      if (Array.isArray(cfg.press_facts) && cfg.press_facts.length) {
        PRESS_FACTS = cfg.press_facts.map((it) => unflattenLocalized(it, ['label', 'value'])).filter(Boolean);
      }
      if (cfg.press_boilerplate) {
        const pb = unflattenLocalized(cfg.press_boilerplate, ['title', 'summary']);
        if (pb) PRESS_BOILERPLATE = pb;
      }
    }

    const fetchPosts = fetch('/content/blogs/index.json', { cache: 'no-cache' })
      .then((r) => r.ok ? r.json() : [])
      .catch(() => []);
    const fetchSidebar = fetch('/content/blog-sidebar.json', { cache: 'no-cache' })
      .then((r) => r.ok ? r.json() : null)
      .catch(() => null);

    Promise.all([fetchPosts, fetchSidebar]).then(([posts, sidebarCfg]) => {
      cachedPosts = Array.isArray(posts) ? posts : [];
      applySidebarConfig(sidebarCfg);
      renderBlogListingLanguage(currentLang());
    });
  })();
</script>
